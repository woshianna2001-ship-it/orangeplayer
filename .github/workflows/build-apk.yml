name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Create clean gradle.properties
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> gradle.properties
        echo "org.gradle.daemon=false" >> gradle.properties
        echo "org.gradle.parallel=true" >> gradle.properties
        echo "org.gradle.caching=true" >> gradle.properties
        cat gradle.properties

    - name: Create maven-publish.gradle
      run: |
        echo "ext {" > maven-publish.gradle
        echo "    pomGroupId = 'io.github.706412584'" >> maven-publish.gradle
        echo "    pomVersion = '1.1.1'" >> maven-publish.gradle
        echo "    configurePom = { pom ->" >> maven-publish.gradle
        echo "        pom.name = 'OrangePlayer'" >> maven-publish.gradle
        echo "        pom.description = 'Enhanced Android video player library'" >> maven-publish.gradle
        echo "        pom.url = 'https://github.com/706412584/orangeplayer'" >> maven-publish.gradle
        echo "        pom.licenses {" >> maven-publish.gradle
        echo "            license {" >> maven-publish.gradle
        echo "                name = 'The Apache License, Version 2.0'" >> maven-publish.gradle
        echo "                url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'" >> maven-publish.gradle
        echo "            }" >> maven-publish.gradle
        echo "        }" >> maven-publish.gradle
        echo "        pom.developers {" >> maven-publish.gradle
        echo "            developer {" >> maven-publish.gradle
        echo "                id = '706412584'" >> maven-publish.gradle
        echo "                name = 'Orange Developer'" >> maven-publish.gradle
        echo "                email = '706412584@qq.com'" >> maven-publish.gradle
        echo "            }" >> maven-publish.gradle
        echo "        }" >> maven-publish.gradle
        echo "        pom.scm {" >> maven-publish.gradle
        echo "            connection = 'scm:git:git://github.com/706412584/orangeplayer.git'" >> maven-publish.gradle
        echo "            developerConnection = 'scm:git:ssh://github.com/706412584/orangeplayer.git'" >> maven-publish.gradle
        echo "            url = 'https://github.com/706412584/orangeplayer'" >> maven-publish.gradle
        echo "        }" >> maven-publish.gradle
        echo "    }" >> maven-publish.gradle
        echo "}" >> maven-publish.gradle
        cat maven-publish.gradle

    - name: Generate keystore
      run: |
        keytool -genkeypair -v -storetype JKS \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass 123123 -keypass 123123 \
          -alias smlieapp \
          -dname "CN=OrangePlayer, OU=Dev, O=OrangePlayer, L=Beijing, ST=Beijing, C=CN" \
          -keystore app/smlieapp.jks

    - name: Build with Gradle
      run: ./gradlew clean assembleRelease --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OrangePlayer-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
