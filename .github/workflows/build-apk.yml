name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Setup CI configuration files
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        
        # Create clean gradle.properties
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=768m" >> gradle.properties
        echo "org.gradle.daemon=false" >> gradle.properties
        echo "org.gradle.parallel=true" >> gradle.properties
        echo "org.gradle.caching=true" >> gradle.properties
        
        # Create maven-publish.gradle stub
        echo "// Maven publish config - stub for CI" > maven-publish.gradle
        
        echo "=== gradle.properties ==="
        cat gradle.properties
        echo "=== maven-publish.gradle ==="
        cat maven-publish.gradle
    
    - name: Clone GSYVideoPlayer submodule
      run: |
        echo "=== Checking GSYVideoPlayer-source ==="
        if [ -d "GSYVideoPlayer-source" ]; then
          echo "Directory exists, checking contents..."
          ls -la GSYVideoPlayer-source/ || true
          if [ ! -f "GSYVideoPlayer-source/gsyVideoPlayer-java/build.gradle" ]; then
            echo "Module not found, removing directory..."
            rm -rf GSYVideoPlayer-source
          fi
        fi
        
        if [ ! -d "GSYVideoPlayer-source" ]; then
          echo "Cloning GSYVideoPlayer repository..."
          git clone --depth 1 --branch master https://github.com/706412584/GSYVideoPlayer.git GSYVideoPlayer-source
        fi
        
        echo "=== Verifying submodule contents ==="
        ls -la GSYVideoPlayer-source/
        
        # Verify required modules exist
        for module in gsyVideoPlayer-base gsyVideoPlayer-java gsyVideoPlayer-ex_so gsyVideoPlayer-exo_player2 gsyVideoPlayer-aliplay; do
          if [ ! -f "GSYVideoPlayer-source/$module/build.gradle" ]; then
            echo "ERROR: Missing module $module"
            exit 1
          fi
          echo "✓ Found module: $module"
        done
        echo "All required modules found!"
    
    - name: Generate debug keystore for release build
      run: |
        echo "Generating keystore..."
        keytool -genkeypair -v -storetype JKS \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass 123123 -keypass 123123 \
          -alias smlieapp \
          -dname "CN=OrangePlayer, OU=Dev, O=OrangePlayer, L=Beijing, ST=Beijing, C=CN" \
          -keystore app/smlieapp.jks
        echo "Keystore generated successfully"
        ls -la app/smlieapp.jks
    
    - name: Build with Gradle
      run: |
        echo "=== Starting build ==="
        echo "Current directory: $(pwd)"
        echo "Java version: $(java -version)"
        echo "Gradle version:"
        ./gradlew --version
        
        ./gradlew clean assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        
        echo "=== Build finished with exit code: $BUILD_EXIT_CODE ==="
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo "=== Build failed! Last 200 lines of build log ==="
          tail -200 build.log
          exit $BUILD_EXIT_CODE
        fi
        echo "Build successful!"
    
    - name: Upload app APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OrangePlayer-App-Release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Upload app-legacy APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OrangePlayer-Legacy-Release
        path: app-legacy/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Upload app-tv APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OrangePlayer-TV-Release
        path: app-tv/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Upload build reports on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-reports
        path: |
          build.log
          build/reports/
          */build/reports/
        retention-days: 7
