name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Create clean gradle.properties
      run: |
        cat > gradle.properties << 'EOF'
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m
        org.gradle.daemon=false
        org.gradle.parallel=true
        org.gradle.caching=true
        EOF
        cat gradle.properties

    - name: Create maven-publish.gradle
      run: |
        cat > maven-publish.gradle << 'EOF'
        ext {
            pomGroupId = 'io.github.706412584'
            pomVersion = '1.1.1'
            configurePom = { pom ->
                pom.name = 'OrangePlayer'
                pom.description = 'Enhanced Android video player library'
                pom.url = 'https://github.com/706412584/orangeplayer'
                pom.licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                    }
                }
                pom.developers {
                    developer {
                        id = '706412584'
                        name = 'Orange Developer'
                        email = '706412584@qq.com'
                    }
                }
                pom.scm {
                    connection = 'scm:git:git://github.com/706412584/orangeplayer.git'
                    developerConnection = 'scm:git:ssh://github.com/706412584/orangeplayer.git'
                    url = 'https://github.com/706412584/orangeplayer'
                }
            }
        }
        EOF
        cat maven-publish.gradle

    - name: Generate keystore
      run: |
        keytool -genkeypair -v -storetype JKS \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass 123123 -keypass 123123 \
          -alias smlieapp \
          -dname "CN=OrangePlayer, OU=Dev, O=OrangePlayer, L=Beijing, ST=Beijing, C=CN" \
          -keystore app/smlieapp.jks

    - name: Build with Gradle
      run: ./gradlew clean assembleRelease --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OrangePlayer-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
