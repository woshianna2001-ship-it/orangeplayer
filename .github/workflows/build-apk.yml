name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Create maven-publish.gradle if missing
      run: |
        if [ ! -f maven-publish.gradle ]; then
          echo "// Maven publish config - stub for CI" > maven-publish.gradle
        fi

    - name: Fix gradle.properties for CI
      run: |
        # Remove local Java path that doesn't exist in CI
        sed -i '/org.gradle.java.home/d' gradle.properties
        # Remove GPG signing config not needed for APK build
        sed -i '/signing\./d' gradle.properties
        sed -i '/ossrhUsername/d' gradle.properties
        sed -i '/ossrhPassword/d' gradle.properties
        cat gradle.properties

    - name: Clone GSYVideoPlayer submodule manually if needed
      run: |
        if [ ! -f GSYVideoPlayer-source/gsyVideoPlayer-java/build.gradle ]; then
          rm -rf GSYVideoPlayer-source
          git clone --depth 1 https://github.com/706412584/GSYVideoPlayer.git GSYVideoPlayer-source
        fi
        ls GSYVideoPlayer-source/

    - name: Generate debug keystore for release build
      run: |
        keytool -genkeypair -v -storetype JKS \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass 123123 -keypass 123123 \
          -alias smlieapp \
          -dname "CN=OrangePlayer, OU=Dev, O=OrangePlayer, L=Beijing, ST=Beijing, C=CN" \
          -keystore app/smlieapp.jks
    
    - name: Build with Gradle
      run: ./gradlew clean assembleRelease --no-daemon --stacktrace
    
    - name: Upload app APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OrangePlayer-App-Release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Upload app-legacy APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OrangePlayer-Legacy-Release
        path: app-legacy/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Upload app-tv APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OrangePlayer-TV-Release
        path: app-tv/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Upload build reports
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-reports
        path: |
          build/reports/
          */build/reports/
        retention-days: 7
