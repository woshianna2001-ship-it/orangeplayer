name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Setup CI configuration files
      run: |
        # Create clean local.properties
        echo "sdk.dir=$ANDROID_HOME" > local.properties

        # Create clean gradle.properties (overwrite existing)
        printf '%s\n' \
          'android.useAndroidX=true' \
          'android.enableJetifier=true' \
          'org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=768m' \
          'org.gradle.daemon=false' \
          'org.gradle.parallel=true' \
          'org.gradle.caching=true' \
          > gradle.properties

        # Create maven-publish.gradle stub if missing
        if [ ! -f maven-publish.gradle ]; then
          echo "// Maven publish config - stub for CI" > maven-publish.gradle
        fi

        echo "=== gradle.properties ==="
        cat gradle.properties
    
    - name: Clone GSYVideoPlayer submodule
      run: |
        # Check if submodule is properly initialized
        if [ ! -f GSYVideoPlayer-source/gsyVideoPlayer-java/build.gradle ]; then
          echo "Submodule not initialized, cloning manually..."
          rm -rf GSYVideoPlayer-source
          git clone --depth 1 https://github.com/706412584/GSYVideoPlayer.git GSYVideoPlayer-source
        fi
        
        # Verify submodule contents
        echo "=== GSYVideoPlayer-source contents ==="
        ls -la GSYVideoPlayer-source/
        
        # Verify required modules exist
        for module in gsyVideoPlayer-base gsyVideoPlayer-java gsyVideoPlayer-ex_so; do
          if [ ! -f "GSYVideoPlayer-source/$module/build.gradle" ]; then
            echo "ERROR: Missing module $module"
            exit 1
          fi
        done
        echo "All required modules found!"
    
    - name: Generate debug keystore for release build
      run: |
        keytool -genkeypair -v -storetype JKS \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass 123123 -keypass 123123 \
          -alias smlieapp \
          -dname "CN=OrangePlayer, OU=Dev, O=OrangePlayer, L=Beijing, ST=Beijing, C=CN" \
          -keystore app/smlieapp.jks
    
    - name: Build with Gradle
      run: |
        echo "=== Starting build ==="
        ./gradlew clean assembleRelease --no-daemon --stacktrace --info 2>&1 | tee build.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "=== Build finished with exit code: $BUILD_EXIT_CODE ==="
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo "=== Last 100 lines of build log ==="
          tail -100 build.log
          exit $BUILD_EXIT_CODE
        fi
    
    - name: Upload app APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OrangePlayer-App-Release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Upload app-legacy APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OrangePlayer-Legacy-Release
        path: app-legacy/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Upload app-tv APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OrangePlayer-TV-Release
        path: app-tv/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Upload build reports on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-reports
        path: |
          build.log
          build/reports/
          */build/reports/
        retention-days: 7
