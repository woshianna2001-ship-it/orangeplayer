name: Publish to Maven Central

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.6)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Decode GPG key
        run: |
          echo "${{ secrets.GPG_SECRET_KEY }}" | base64 --decode > $HOME/secring.gpg
      
      - name: Create gradle.properties
        run: |
          cat > gradle.properties << EOF
          ossrhUsername=${{ secrets.OSSRH_USERNAME }}
          ossrhPassword=${{ secrets.OSSRH_PASSWORD }}
          signing.keyId=${{ secrets.SIGNING_KEY_ID }}
          signing.password=${{ secrets.SIGNING_PASSWORD }}
          signing.secretKeyRingFile=$HOME/secring.gpg
          EOF
      
      - name: Build library
        run: ./gradlew clean build
      
      - name: Publish to Maven Central
        run: |
          ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository
      
      - name: Cleanup
        if: always()
        run: |
          rm -f $HOME/secring.gpg
          rm -f gradle.properties
      
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: palyerlibrary/build/outputs/aar/*.aar
